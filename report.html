<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>dice-web report</title>
    <meta
      name="description"
      content="Standalone report view for dice-web render plans."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles/app.css" />
  </head>
  <body class="report-page">
    <main class="report-shell">
      <div class="section-header">
        <div class="section-title">Report</div>
      </div>
      <div id="report-empty" class="chart-empty">
        Run a program in the main app first to populate the report view.
      </div>
      <div id="report-output"></div>
    </main>

    <script src="./vendor/d3.min.js"></script>
    <script src="./vendor/observable-plot.umd.min.js"></script>
    <script type="module" src="./src/report-page.js"></script>
  </body>
</html>
